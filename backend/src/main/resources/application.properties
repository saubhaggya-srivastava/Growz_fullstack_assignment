# Application Configuration
spring.application.name=sales-store-analytics

# Server Configuration
server.port=8080

# H2 Database Configuration (File-based)
spring.datasource.url=jdbc:h2:file:./data/analytics
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Spring Cache Configuration (Simple in-memory)
spring.cache.type=simple
spring.cache.cache-names=salesByBrand,salesByProduct,salesByMonth,salesByRegion,salesByCategory,activeStores,activeStoresByBrand,activeStoresByRegion

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# CORS Configuration (will be handled in code)
# Allowing frontend origin: http://localhost:3000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.growz.analytics=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
